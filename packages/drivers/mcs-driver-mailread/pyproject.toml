[build-system]
requires = ["setuptools>=63", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name            = "mcs-driver-mailread"
version         = "0.1.0"
description     = "Mail-reading driver for the Model Context Standard -- lets an LLM read and organise e-mail."
readme          = "README.md"
requires-python = ">=3.9"
license         = "Apache-2.0"
keywords        = ["mcs", "modelcontextstandard", "driver", "mail", "email", "imap"]
authors         = [{ name = "Danny Gerst", email = "danny@dannygerst.de" }]
license-files   = ["LICENSE"]
classifiers     = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Email",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]

urls = {"Homepage" = "https://www.modelcontextstandard.io", "Source" = "https://github.com/modelcontextstandard/python-sdk"}

dependencies = [
    "mcs-driver-core>=0.2",
]

[project.optional-dependencies]
imap      = ["mcs-adapter-imap>=0.1"]
gmail     = ["mcs-adapter-http>=0.2"]
inspector = ["mcs-inspector>=0.1"]

[tool.uv.sources]
mcs-driver-core   = { workspace = true }
mcs-adapter-imap  = { workspace = true }
mcs-adapter-http  = { workspace = true }
mcs-inspector     = { workspace = true }

[tool.setuptools.packages.find]
where = ["src"]
