[build-system]
requires = ["setuptools>=63", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name            = "mcs-driver-filesystem"
version         = "0.2.0"
description     = "Filesystem driver for the Model Context Standard."
readme          = "README.md"
requires-python = ">=3.9"
license         = "Apache-2.0"
keywords        = ["mcs", "modelcontextstandard", "driver", "filesystem"]
authors         = [{ name = "Danny Gerst", email = "danny@dannygerst.de" }]

urls = {"Homepage" = "https://www.modelcontextstandard.io", "Source" = "https://github.com/modelcontextstandard/python-sdk"}

dependencies = [
    "mcs-driver-core>=0.2",
]

[tool.uv.sources]
mcs-driver-core = { workspace = true }

[tool.setuptools.packages.find]
where = ["src"]
