[build-system]
requires = ["setuptools>=63", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name            = "mcs-driver-core"
version         = "0.2.1"
description     = "Core driver contract for the Model Context Standard."
readme          = "README.md"
requires-python = ">=3.9"
license         = "Apache-2.0"
license-files   = ["LICENSE"]
keywords        = ["mcs", "modelcontextstandard", "mcs-driver", "mcs-tools", "mcs-orchestrator", "python-sdk", "function-calling", "llm", "driver"]
authors         = [{ name = "Danny Gerst", email = "danny@dannygerst.de" }]
classifiers     = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

urls = {"Homepage" = "https://www.modelcontextstandard.io", "Source" = "https://github.com/modelcontextstandard/python-sdk"}

dependencies    = []

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.6",
  "pre-commit>=3.8",
  "build>=1.2",
  "twine>=5.1",
  "basedpyright>=1.18",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"mcs.driver.core" = ["prompts/*.toml"]
