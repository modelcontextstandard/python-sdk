[build-system]
requires = ["setuptools>=63", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name            = "mcs-adapter-smb-smbprotocol"
version         = "0.1.0"
description     = "SMB/CIFS filesystem adapter (smbprotocol) for the Model Context Standard."
readme          = "README.md"
requires-python = ">=3.9"
license         = "Apache-2.0"
keywords        = ["mcs", "modelcontextstandard", "adapter", "smb", "cifs", "smbprotocol"]
authors         = [{ name = "Danny Gerst", email = "danny@dannygerst.de" }]

urls = {"Homepage" = "https://www.modelcontextstandard.io", "Source" = "https://github.com/modelcontextstandard/python-sdk"}

dependencies = [
    "smbprotocol>=1.0",
]

[tool.setuptools.packages.find]
where = ["src"]
