[build-system]
requires = ["setuptools>=63", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name            = "mcs-adapter-ssh"
version         = "0.1.0"
description     = "SSH adapter for the MCS Sandbox Driver — turns any Linux server into a sandbox via SSH."
requires-python = ">=3.9"
license         = "Apache-2.0"
dependencies    = ["paramiko>=3.0"]

[tool.setuptools.packages.find]
where = ["src"]
